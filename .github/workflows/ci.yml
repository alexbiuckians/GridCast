name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Unit tests
        run: pytest -q

      - name: Training smoke-test (fast end-to-end)
        env:
          SMOKE: "true"
        run: |
          python - <<'PY'
          import yaml
          p = yaml.safe_load(open("params.yaml"))
          p["train"]["smoke_test"] = True
          yaml.safe_dump(p, open("params.yaml", "w"))
          PY
          python -m src.ingest
          python -m src.clean
          python -m src.features
          python -m src.train
          python -m src.evaluate

      - name: API smoke-test (model loads + serves)
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from src.serve import app
          c = TestClient(app)
          assert c.get("/health").json()["model_loaded"] is True, "model failed to load"
          print("API serves trained model OK")
          PY
